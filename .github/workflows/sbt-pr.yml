name: SBT CI

permissions:
  contents: read

on:
  pull_request:
    branches: ["*"]

jobs:
  call-sbt-ci:
    uses: project-ncl/shared-github-actions/.github/workflows/sbt-ci.yml@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
    with:
      build_args: "clean; compile; +test; makePom; scripted smeg-plugin/*"
      upload_artifacts: true
