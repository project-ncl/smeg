name: Mend CLI scan for SBT

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 22 * * 0"

permissions:
  contents: read
  actions: read
  checks: write
  pull-requests: write
  security-events: write

jobs:
  build:
    uses: project-ncl/shared-github-actions/.github/workflows/sbt-ci.yml@3b0266cacc8d9b44f6cbaf3bf52419d81510a81f # main
    with:
      build_args: "clean; compile; +test; scripted smeg-plugin/*"
      upload_artifacts: true

  call-mend-ci:
    needs: build
    uses: project-ncl/shared-github-actions/.github/workflows/mend-ci.yml@3b0266cacc8d9b44f6cbaf3bf52419d81510a81f # main
    with:
      SCA: true
      SAST: true
    secrets:
      MEND_URL: ${{ secrets.MEND_URL }}
      MEND_USER_KEY: ${{ secrets.MEND_USER_KEY }}
      MEND_EMAIL: ${{ secrets.MEND_EMAIL }}
      MEND_ORGNAME: ${{ secrets.MEND_ORGNAME }}
      MEND_PRODUCTNAME: ${{ secrets.MEND_PRODUCTNAME }}
