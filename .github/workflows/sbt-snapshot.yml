name: Build snapshot version and upload

permissions:
  contents: read

on:
  push:
    branches: ["main"]

jobs:
  call-snapshot-job:
    uses: project-ncl/shared-github-actions/.github/workflows/sbt-snapshot.yml@0fd979fcdd90cf1b62e6410221d64efd6b470865 # v0.0.21
    with:
      project_name: "project-ncl/smeg"
      build_args: "clean; compile; +test; scripted smeg-plugin/*"
    secrets:
      SNAPSHOT_USER: ${{ secrets.SNAPSHOT_USER }}
      SNAPSHOT_PASSWORD: ${{ secrets.SNAPSHOT_PASSWORD }}
